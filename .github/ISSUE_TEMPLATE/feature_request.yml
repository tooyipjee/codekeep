name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: We love hearing ideas for CodeKeep!
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is your feature request related to a problem? Describe it.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gameplay / Mechanics
        - UI / UX
        - Multiplayer / PvP
        - Performance
        - Deployment / Self-hosting
        - Other
    validations:
      required: true
