name: Crash Report (auto-generated)
description: Automatically generated crash report from the game
title: "[Crash]: "
labels: ["bug", "crash"]
body:
  - type: markdown
    attributes:
      value: This crash report was auto-generated by the CodeKeep client.
  - type: textarea
    id: error
    attributes:
      label: Error details
      render: shell
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Game context
      render: json
  - type: input
    id: version
    attributes:
      label: Version
  - type: input
    id: os
    attributes:
      label: OS
  - type: input
    id: node
    attributes:
      label: Node version
