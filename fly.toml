app = "codekeep-api"
primary_region = "sjc"

[build]

[env]
  CODEKEEP_PORT = "8080"
  CODEKEEP_HOST = "0.0.0.0"
  CODEKEEP_DB_PATH = "/data/codekeep.db"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/healthz"
  timeout = "5s"

[mounts]
  source = "codekeep_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
