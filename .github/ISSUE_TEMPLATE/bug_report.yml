name: Bug Report
description: Report a bug in CodeKeep
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of what the bug is.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start the game with `codekeep`
        2. Navigate to...
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of CodeKeep? (run `codekeep --version`)
      placeholder: "0.1.0"
  - type: dropdown
    id: mode
    attributes:
      label: Game mode
      options:
        - Offline (local)
        - Online (multiplayer)
        - Both
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error logs / terminal output
      description: Paste any error output or crash logs here.
      render: shell
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.3, Windows 11, Ubuntu 24.04..."
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v20.11.0"
  - type: input
    id: terminal
    attributes:
      label: Terminal
      placeholder: "iTerm2, Windows Terminal, Kitty..."
