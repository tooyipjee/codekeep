version: "3.8"

services:
  codekeep-api:
    build: .
    ports:
      - "3000:8080"
    environment:
      - CODEKEEP_PORT=8080
      - CODEKEEP_HOST=0.0.0.0
      - CODEKEEP_DB_PATH=/data/codekeep.db
      - JWT_SECRET=${JWT_SECRET:-codekeep-self-hosted-secret}
      - NODE_ENV=production
    volumes:
      - codekeep-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  codekeep-data:
