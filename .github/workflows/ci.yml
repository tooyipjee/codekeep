name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run all tests
        run: pnpm test

      - name: Type check (db + api + server + shared)
        run: pnpm --filter @codekeep/shared typecheck && pnpm --filter @codekeep/db typecheck && pnpm --filter @codekeep/server typecheck && pnpm --filter @codekeep/api typecheck

      - name: Type check (cli — pre-existing issues)
        run: pnpm --filter @codekeep/cli typecheck
        continue-on-error: true
